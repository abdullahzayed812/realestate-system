version: '3.9'

services:
  # ============================================================
  # Infrastructure
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: realestate_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-realestate_db}
      MYSQL_USER: ${DB_USER:-realestate}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./shared/database/src/migrations:/docker-entrypoint-initdb.d:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --max-connections=500
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: realestate_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Backend Services
  # ============================================================
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: realestate_auth
    restart: unless-stopped
    env_file: services/auth-service/.env
    environment:
      DB_HOST: mysql
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  property-service:
    build:
      context: .
      dockerfile: services/property-service/Dockerfile
    container_name: realestate_property
    restart: unless-stopped
    env_file: services/property-service/.env
    environment:
      DB_HOST: mysql
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379
    ports:
      - "3002:3002"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  booking-service:
    build:
      context: .
      dockerfile: services/booking-service/Dockerfile
    container_name: realestate_booking
    restart: unless-stopped
    env_file: services/booking-service/.env
    environment:
      DB_HOST: mysql
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379
    ports:
      - "3003:3003"
    depends_on:
      mysql:
        condition: service_healthy

  chat-service:
    build:
      context: .
      dockerfile: services/chat-service/Dockerfile
    container_name: realestate_chat
    restart: unless-stopped
    env_file: services/chat-service/.env
    environment:
      DB_HOST: mysql
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379
    ports:
      - "3004:3004"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: realestate_notification
    restart: unless-stopped
    env_file: services/notification-service/.env
    environment:
      DB_HOST: mysql
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379
    ports:
      - "3005:3005"
    depends_on:
      mysql:
        condition: service_healthy

  media-service:
    build:
      context: .
      dockerfile: services/media-service/Dockerfile
    container_name: realestate_media
    restart: unless-stopped
    env_file: services/media-service/.env
    ports:
      - "3006:3006"

  # ============================================================
  # API Gateway (Nginx)
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: realestate_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - auth-service
      - property-service
      - booking-service
      - chat-service
      - media-service
      - notification-service

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
  worker_connections 1024;
}

http {
  upstream auth_service {
    server auth-service:3001;
  }

  upstream property_service {
    server property-service:3002;
  }

  upstream booking_service {
    server booking-service:3003;
  }

  upstream chat_service {
    server chat-service:3004;
  }

  upstream notification_service {
    server notification-service:3005;
  }

  upstream media_service {
    server media-service:3006;
  }

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

  server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Auth Service
    location /api/auth/ {
      limit_req zone=auth burst=20 nodelay;
      proxy_pass http://auth_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Property Service
    location /api/properties/ {
      limit_req zone=api burst=50 nodelay;
      proxy_pass http://property_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Booking Service
    location /api/bookings/ {
      limit_req zone=api burst=30 nodelay;
      proxy_pass http://booking_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Chat Service (REST)
    location /api/chats {
      proxy_pass http://chat_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Chat Service (WebSocket)
    location /socket.io/ {
      proxy_pass http://chat_service;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 86400;
    }

    # Media Service
    location /api/media/ {
      client_max_body_size 100M;
      proxy_pass http://media_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_request_buffering off;
    }

    # Notification Service
    location /api/notifications/ {
      proxy_pass http://notification_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}

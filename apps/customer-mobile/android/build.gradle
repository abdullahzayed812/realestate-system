buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 24
        compileSdkVersion = 35
        targetSdkVersion = 35
        ndkVersion = "26.1.10909125"
        kotlinVersion = "1.9.22"
        // Monorepo: react-native is hoisted to the workspace root
        REACT_NATIVE_NODE_MODULES_DIR = file("../../../node_modules/react-native").absolutePath
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // Explicit AGP version to override the 8.2.1 pinned inside @react-native/gradle-plugin
        classpath("com.android.tools.build:gradle:8.6.0")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"
